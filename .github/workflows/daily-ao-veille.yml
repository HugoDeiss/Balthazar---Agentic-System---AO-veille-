name: AO Veille Quotidienne

on:
  schedule:
    # Tous les jours à 6h00 UTC (7h Paris hiver, 8h Paris été)
    - cron: '0 6 * * *'
  
  # Permet de déclencher manuellement le workflow pour tester
  workflow_dispatch:
    inputs:
      since:
        description: 'Date de début (YYYY-MM-DD) - laissez vide pour hier'
        required: false
        type: string
      until:
        description: 'Date de fin (YYYY-MM-DD) - optionnel, pour plage (ex: 21/01 au 03/02)'
        required: false
        type: string
      clientId:
        description: 'ID du client (laissez vide pour utiliser le défaut)'
        required: false
        type: string

jobs:
  run-ao-veille:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📅 Calculer la date de recherche
        id: date
        run: |
          if [ -n "${{ github.event.inputs.since }}" ]; then
            echo "since=${{ github.event.inputs.since }}" >> $GITHUB_OUTPUT
          else
            echo "since=$(date -d '1 day ago' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ github.event.inputs.until }}" ]; then
            echo "until=${{ github.event.inputs.until }}" >> $GITHUB_OUTPUT
          else
            echo "until=" >> $GITHUB_OUTPUT
          fi
      
      - name: 📡 Déterminer activation MarchesOnline
        id: marchesonline
        run: |
          DAY_OF_WEEK=$(date +%u)  # 1=lundi, 3=mercredi, 5=vendredi, 7=dimanche
          
          if [ "$DAY_OF_WEEK" -eq 3 ] || [ "$DAY_OF_WEEK" -eq 5 ]; then
            echo "📡 MarchesOnline activé (mercredi ou vendredi)"
            echo 'urls=["https://www.marchesonline.com/mol/rss/appels-d-offres-domaine-activite-services.xml"]' >> $GITHUB_OUTPUT
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "📡 MarchesOnline désactivé"
            echo 'urls=[]' >> $GITHUB_OUTPUT
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 🚀 Déclencher le workflow AO Veille
        id: trigger
        run: |
          # GitHub Actions = orchestration uniquement :
          # on déclenche le workflow Mastra et on vérifie le code HTTP.
          # Ne pas stocker de gros JSON dans les outputs (risque de dépassement mémoire côté expressions GitHub).
          RUN_ID="gh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          CLIENT_ID="${{ github.event.inputs.clientId }}"
          if [ -z "$CLIENT_ID" ]; then
            CLIENT_ID="${{ secrets.BALTHAZAR_CLIENT_ID }}"
          fi
          
          echo "🔗 GitHub Run ID: $RUN_ID"
          echo "🔍 Lancement de la veille pour le client: $CLIENT_ID"
          echo "📅 Depuis: ${{ steps.date.outputs.since }}"
          echo "📅 Jusqu'à: ${{ steps.date.outputs.until }}"
          echo "📡 MarchesOnline: ${{ steps.marchesonline.outputs.enabled }}"
          echo ""
          
          # Health check optionnel de Mastra Cloud
          echo "🏥 Vérification de la disponibilité de Mastra Cloud..."
          HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 ${{ secrets.MASTRA_CLOUD_URL }} || echo "000")
          
          if [ "$HEALTH_CHECK" = "000" ]; then
            echo "⚠️  Mastra Cloud ne répond pas (timeout)"
          elif [ "$HEALTH_CHECK" = "200" ] || [ "$HEALTH_CHECK" = "404" ]; then
            echo "✅ Mastra Cloud est accessible (code $HEALTH_CHECK)"
          else
            echo "⚠️  Mastra Cloud répond avec le code $HEALTH_CHECK"
          fi
          echo ""
          
          # Construire le JSON de manière sécurisée avec jq
          echo "📦 Construction du payload JSON..."
          PAYLOAD=$(jq -n \
            --arg clientId "$CLIENT_ID" \
            --arg since "${{ steps.date.outputs.since }}" \
            --arg until "${{ steps.date.outputs.until }}" \
            --argjson urls '${{ steps.marchesonline.outputs.urls }}' \
            '{
              inputData: (
                {
                  clientId: $clientId,
                  since: $since,
                  marchesonlineRSSUrls: $urls
                } | if $until != "" then . + {until: $until} else . end
              )
            }')
          
          echo "📦 Payload construit (compact):"
          echo "$PAYLOAD" | jq -c '.'
          
          # Valider que le JSON est bien formé
          if ! echo "$PAYLOAD" | jq empty 2>/dev/null; then
            echo "❌ ERREUR CRITIQUE: Le payload JSON est invalide"
            echo "$PAYLOAD"
            exit 1
          fi
          echo "✅ Payload JSON validé"
          echo ""
          
          # Retry logic pour gérer les erreurs transitoires
          # ⚠️ Cas particulier 524 (Cloudflare timeout) :
          # Dans la pratique, Mastra démarre le workflow avant que Cloudflare coupe la connexion.
          # On traite donc 524 comme un succès pour éviter les doublons d'exécution / emails.
          MAX_RETRIES=3
          RETRY_DELAY=10  # secondes
          SUCCESS=false
          
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "🔄 Tentative $attempt/$MAX_RETRIES..."
            
            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 120 -X POST \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Run-Id: $RUN_ID" \
              -d "$PAYLOAD" \
              ${{ secrets.MASTRA_CLOUD_URL }}/api/workflows/aoVeilleWorkflow/start-async)
            
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            
            echo "📊 Code HTTP: $HTTP_CODE"
            
            # Si succès (2xx) ou timeout Cloudflare 524, on considère que le workflow est lancé
            if [[ "$HTTP_CODE" =~ ^2 ]] || [[ "$HTTP_CODE" == "524" ]]; then
              echo "✅ Workflow lancé (code $HTTP_CODE)"
              SUCCESS=true
              break
            # Si erreur client (4xx), on arrête sans retry
            elif [[ "$HTTP_CODE" =~ ^4 ]]; then
              echo "❌ Erreur client (code $HTTP_CODE) - Pas de retry"
              break
            fi
            
            # Si erreur serveur (5xx) et pas la dernière tentative, on retry
            if [ $attempt -lt $MAX_RETRIES ]; then
              echo "⚠️  Erreur serveur (code $HTTP_CODE), retry dans ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            else
              echo "❌ Échec après $MAX_RETRIES tentatives"
            fi
          done
          
          # Vérifier le succès final
          if [ "$SUCCESS" != "true" ] && [[ ! "$HTTP_CODE" =~ ^2 ]]; then
            echo "❌ Le workflow n'a pas pu être déclenché"
          fi
          
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          echo ""
          echo "═══════════════════════════════════════"
          echo "📊 Résultat Final"
          echo "═══════════════════════════════════════"
          echo "🔗 GitHub Run ID: $RUN_ID"
          echo "📊 Code HTTP: $HTTP_CODE"
          echo "🕐 Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          # Preview tronqué de la réponse
          MAX_PREVIEW_CHARS=4000
          BODY_PREVIEW="$BODY"
          if [ ${#BODY_PREVIEW} -gt $MAX_PREVIEW_CHARS ]; then
            BODY_PREVIEW="${BODY_PREVIEW:0:$MAX_PREVIEW_CHARS}...[truncated]"
          fi
          echo "📦 Réponse (preview):"
          echo "$BODY_PREVIEW"
          
          # Si erreur, afficher le payload pour debug
          if [[ ! "$HTTP_CODE" =~ ^2 ]]; then
            echo ""
            echo "⚠️  PAYLOAD ENVOYÉ (pour debug):"
            echo "$PAYLOAD" | jq '.'
          fi
          echo "═══════════════════════════════════════"
      
      - name: ✅ Vérifier le succès
        if: ${{ startsWith(steps.trigger.outputs.http_code, '2') }}
        run: |
          echo "✅ Workflow exécuté avec succès (code HTTP 2xx)."
          echo "ℹ️  Voir les logs de l'étape '🚀 Déclencher le workflow AO Veille' pour le détail de la réponse Mastra."
      
      - name: ❌ Gérer l'échec
        if: ${{ !startsWith(steps.trigger.outputs.http_code, '2') }}
        run: |
          echo "❌ Le workflow a échoué avec le code HTTP: ${{ steps.trigger.outputs.http_code }}"
          echo ""
          echo "🔍 Actions de debug recommandées:"
          echo "1. Vérifier les logs de l'étape '🚀 Déclencher le workflow AO Veille'"
          echo "2. Vérifier le payload JSON envoyé (affiché dans les logs si erreur)"
          echo "3. Vérifier les logs Mastra Cloud pour le GitHub Run ID"
          echo "4. Tester manuellement avec curl (voir GITHUB_WORKFLOW_QUOTIDIEN.md)"
          echo ""
          echo "📚 Documentation: GITHUB_WORKFLOW_QUOTIDIEN.md"
          exit 1
      
      - name: 📧 Notifier en cas d'échec
        if: failure()
        run: |
          echo "⚠️ ATTENTION: Le workflow AO Veille a échoué !"
          echo "Vérifiez les logs ci-dessus pour plus de détails."
          # TODO: Ajouter une notification email/Slack ici si nécessaire

